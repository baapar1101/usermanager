<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>سرویس پرو</title>
    <script src="../js/generic.js"></script>
    <script src="../js/login.js"></script>
    <style>

                *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        /* Local Vazirmatn font */
        @font-face {
            font-family: 'Vazirmatn';
            src: url('../css/Vazirmatn-Regular.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Vazirmatn';
            src: url('../css/Vazirmatn-Medium.woff2') format('woff2');
            font-weight: 500;
        }

        @font-face {
            font-family: 'Vazirmatn';
            src: url('../css/Vazirmatn-Bold.woff2') format('woff2');
            font-weight: bold;
        }
        :root {
            --crimson: #C0392B;
            --crimson-dark: #922B21;
            --crimson-light: #E74C3C;
            --crimson-glow: rgba(192, 57, 43, 0.25);
            --gold: #F39C12;
            --dark: #0D0D0D;
            --dark-2: #161616;
            --dark-3: #1E1E1E;
            --dark-4: #2A2A2A;
            --surface: #1A1A1A;
            --border: rgba(255,255,255,0.07);
            --text: #F5F5F5;
            --text-muted: rgba(245,245,245,0.45);
            --font: 'Vazirmatn', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: var(--font);
            background: var(--dark);
            color: var(--text);
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(192,57,43,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(192,57,43,0.08) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        /* Geometric pattern overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .page {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Ornamental corner decorations */
        .corner {
            position: fixed;
            width: 200px;
            height: 200px;
            z-index: 0;
        }
        .corner svg { width: 100%; height: 100%; opacity: 0.12; }
        .corner-tl { top: 0; right: 0; }
        .corner-br { bottom: 0; left: 0; transform: rotate(180deg); }

        .login-card {
            background: var(--dark-3);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(192,57,43,0.08),
                0 40px 80px rgba(0,0,0,0.6),
                0 0 80px rgba(192,57,43,0.05);
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Header band */
        .card-header {
            background: linear-gradient(135deg, var(--crimson-dark) 0%, var(--crimson) 100%);
            padding: 32px 36px 28px;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255,255,255,0.03) 10px,
                rgba(255,255,255,0.03) 20px
            );
        }

        .brand {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .brand-text h1 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
        }

        .brand-text p {
            font-size: 12px;
            color: rgba(255,255,255,0.65);
            margin-top: 2px;
            font-weight: 300;
        }

        /* Decorative arc */
        .header-arc {
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 20px;
        }
        .header-arc svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Form body */
        .card-body {
            padding: 32px 36px 28px;
        }

        .welcome-text {
            margin-bottom: 28px;
        }

        .welcome-text h2 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .welcome-text p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.7;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            transition: color 0.2s;
        }

        .field:focus-within label {
            color: var(--crimson-light);
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            transition: color 0.2s;
            pointer-events: none;
        }

        .field:focus-within .icon { color: var(--crimson-light); }

        .field input {
            width: 100%;
            background: var(--dark-4);
            border: 1.5px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            padding: 14px 44px 14px 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            direction: ltr;
            text-align: right;
        }

        .field input:focus {
            border-color: var(--crimson);
            background: var(--dark-2);
            box-shadow: 0 0 0 4px var(--crimson-glow);
        }

        .field input::placeholder {
            color: rgba(255,255,255,0.2);
            font-family: var(--font);
        }

        /* Error */
        #error-text {
            min-height: 36px;
            font-size: 13px;
            color: #FF6B6B;
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.2);
            border-radius: 10px;
            padding: 8px 14px;
            margin-bottom: 16px;
            display: none;
            animation: shake 0.4s ease;
        }

        #error-text.visible { display: block; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-6px); }
            40%       { transform: translateX(6px); }
            60%       { transform: translateX(-4px); }
            80%       { transform: translateX(4px); }
        }

        .btn-login {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, var(--crimson-dark), var(--crimson-light));
            color: #fff;
            font-family: var(--font);
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 24px rgba(192,57,43,0.35);
        }

        .btn-login::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            border-radius: inherit;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(192,57,43,0.5);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .card-footer {
            padding: 16px 36px 24px;
            text-align: center;
            border-top: 1px solid var(--border);
        }

        .card-footer p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .card-footer span {
            color: var(--crimson-light);
            font-weight: 500;
        }
    </style>
</head>
<body>

<!-- Corner ornaments -->
<div class="corner corner-tl">
    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M200 0 Q100 0 0 100 Q50 50 100 0Z" fill="#C0392B"/>
        <path d="M200 20 Q110 20 20 110 Q70 60 120 20Z" fill="#C0392B" opacity="0.5"/>
        <circle cx="180" cy="20" r="8" fill="#C0392B" opacity="0.6"/>
        <circle cx="155" cy="15" r="4" fill="#C0392B" opacity="0.4"/>
    </svg>
</div>
<div class="corner corner-br">
    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M200 0 Q100 0 0 100 Q50 50 100 0Z" fill="#C0392B"/>
        <path d="M200 20 Q110 20 20 110 Q70 60 120 20Z" fill="#C0392B" opacity="0.5"/>
        <circle cx="180" cy="20" r="8" fill="#C0392B" opacity="0.6"/>
        <circle cx="155" cy="15" r="4" fill="#C0392B" opacity="0.4"/>
    </svg>
</div>

<div class="page">
    <div class="login-card">
        <!-- Header -->
        <div class="card-header">
            <div class="brand">
                <div class="brand-icon">🌐</div>
                <div class="brand-text">
                    <h1>اینترنت پرو</h1>
                    <p>مدیریت کاربران پرو</p>
                </div>
            </div>
            <div class="header-arc">
                <svg viewBox="0 0 420 20" preserveAspectRatio="none">
                    <path d="M0 20 Q210 0 420 20 L420 20 L0 20Z" fill="#1E1E1E"/>
                </svg>
            </div>
        </div>

        <!-- Form Body -->
        <div class="card-body">
            <div class="welcome-text">
                <h2>خوش آمدید 👋</h2>
                <p>برای ورود به پنل مدیریت، اطلاعات خود را وارد کنید</p>
            </div>

            <form onsubmit="loginSubmited(); return false;">
                <div class="field">
                    <label for="username">نام کاربری</label>
                    <div class="input-wrap">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                        </svg>
                        <input type="text" id="username" name="username" placeholder="نام کاربری خود را وارد کنید" autocomplete="username">
                    </div>
                </div>

                <div class="field">
                    <label for="password">رمز عبور</label>
                    <div class="input-wrap">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="password" name="password" placeholder="رمز عبور خود را وارد کنید" autocomplete="current-password">
                    </div>
                </div>

                <div id="error-text"></div>

                <button type="submit" class="btn-login">ورود به سیستم</button>
            </form>
        </div>

        <div class="card-footer">
            <p>Pro User Manager &mdash; <span>نسخه 1</span></p>
        </div>
    </div>
</div>

<script>
// Override error display to add visible class
var origLoginSubmited = loginSubmited;
document.addEventListener('DOMContentLoaded', function() {
    var errEl = document.getElementById('error-text');
    var observer = new MutationObserver(function() {
        if (errEl.innerHTML.trim()) {
            errEl.classList.add('visible');
            // Re-trigger shake animation
            errEl.style.animation = 'none';
            errEl.offsetHeight;
            errEl.style.animation = '';
        } else {
            errEl.classList.remove('visible');
        }
    });
    observer.observe(errEl, { childList: true, subtree: true, characterData: true });
});
</script>
</body>
</html>
